<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HostelConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body style="height: 100vh; display: flex; flex-direction: column;">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">HostelConnect</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        </div>
    </nav>

    <div style="flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg-body);">
        <div class="feature-card"
            style="width: 100%; max-width: 400px; padding: 2.5rem; border-top: 4px solid var(--accent-color);">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--text-main);">Admin Portal</h2>

            <form id="login-form">
                <div style="margin-bottom: 1rem;">
                    <label for="username"
                        style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
                    <input type="text" id="username" required placeholder="admin"
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label for="password"
                        style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                    <input type="password" id="password" required placeholder="admin123"
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                </div>

                <div id="error-msg"
                    style="color: var(--danger-color); font-size: 0.875rem; margin-bottom: 1rem; text-align: center; display: none;">
                    Invalid admin credentials
                </div>

                <button type="submit" class="btn btn-primary"
                    style="background-color: var(--text-main); color: var(--bg-body); width: 100%;">Login as
                    Admin</button>
            </form>
        </div>
    </div>

    <!-- Auth Script -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
