<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - HostelConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="auth-page-body">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">HostelConnect</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        </div>
    </nav>

    <div class="auth-container">
        <div class="feature-card auth-card">
            <h2 class="auth-title">Student Login</h2>

            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" required placeholder="user" class="form-input">
                </div>

                <div class="form-group mb-lg">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" required placeholder="user123" class="form-input">
                </div>

                <div id="error-msg" class="auth-error">
                    Invalid username or password
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="register.html" class="auth-link">Register Account</a>
            </p>
        </div>
    </div>

    <!-- Auth Script -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
