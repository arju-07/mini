<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HostelConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="auth-page-body">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">HostelConnect</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
                <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open Menu">☰</button>
            </div>
        </div>
    </nav>

    <div class="auth-container register">
        <div class="feature-card auth-card register">
            <h2 class="auth-title">Student Registration</h2>

            <form id="register-form">
                <div class="grid gap-4 form-group" style="grid-template-columns: 1fr 1fr;">
                    <div>
                        <label for="reg-name" class="form-label">Full Name</label>
                        <input type="text" id="reg-name" required placeholder="Leo Das" class="form-input">
                    </div>
                    <div>
                        <label for="reg-roll" class="form-label">Roll Number</label>
                        <input type="text" id="reg-roll" required placeholder="123456" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-hostel" class="form-label">Hostel Block / Room</label>
                    <input type="text" id="reg-hostel" required placeholder="Block A - 101" class="form-input">
                </div>

                <div class="form-group">
                    <label for="reg-username" class="form-label">Username</label>
                    <input type="text" id="reg-username" required placeholder="Choose a username" class="form-input">
                </div>

                <div class="form-group mb-lg">
                    <label for="reg-password" class="form-label">Password</label>
                    <input type="password" id="reg-password" required placeholder="Choose a password"
                        class="form-input">
                </div>

                <div id="reg-msg" class="auth-success">
                    Registration successful! Please wait for admin approval.
                </div>
                <div id="reg-error" class="auth-error">
                    Username already exists.
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Register</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="user-login.html" class="auth-link">Login here</a>
            </p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
    <script type="module" src="backend.js" defer></script>
</body>

</html>
