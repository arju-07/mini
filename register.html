<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HostelConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body style="height: 100vh; display: flex; flex-direction: column;">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">HostelConnect</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
                <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open Menu">☰</button>
            </div>
        </div>
    </nav>

    <div
        style="flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg-body); padding: 2rem 0;">
        <div class="feature-card" style="width: 100%; max-width: 500px; padding: 2.5rem;">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary-color);">Student Registration</h2>

            <form id="register-form">
                <div class="grid gap-4" style="grid-template-columns: 1fr 1fr; margin-bottom: 1rem;">
                    <div>
                        <label for="reg-name" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Full
                            Name</label>
                        <input type="text" id="reg-name" required placeholder="John Doe"
                            style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                    </div>
                    <div>
                        <label for="reg-roll" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Roll
                            Number</label>
                        <input type="text" id="reg-roll" required placeholder="123456"
                            style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                    </div>
                </div>

                <div style="margin-bottom: 1rem;">
                    <label for="reg-hostel" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Hostel
                        Block / Room</label>
                    <input type="text" id="reg-hostel" required placeholder="Block A - 101"
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                </div>

                <div style="margin-bottom: 1rem;">
                    <label for="reg-username"
                        style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
                    <input type="text" id="reg-username" required placeholder="Choose a username"
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label for="reg-password"
                        style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                    <input type="password" id="reg-password" required placeholder="Choose a password"
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                </div>

                <div id="reg-msg"
                    style="color: var(--secondary-color); font-size: 0.875rem; margin-bottom: 1rem; text-align: center; display: none;">
                    Registration successful! Please wait for admin approval.
                </div>
                <div id="reg-error"
                    style="color: var(--danger-color); font-size: 0.875rem; margin-bottom: 1rem; text-align: center; display: none;">
                    Username already exists.
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary-color);">Login here</a>
            </p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
