<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - HostelConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: calc(100vh - 72px);
        }

        .sidebar {
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1rem;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .menu-item {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .menu-item:hover,
        .menu-item.active {
            background-color: rgba(79, 70, 229, 0.1);
            color: var(--primary-color);
            font-weight: 500;
        }

        .main-content {
            padding: 2rem;
            background-color: var(--bg-body);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-submitted {
            background-color: #DBEAFE;
            color: #1E40AF;
        }

        .status-review {
            background-color: #FEF3C7;
            color: #92400E;
        }

        .status-progress {
            background-color: #D1FAE5;
            color: #065F46;
        }

        .status-resolved {
            background-color: #E0E7FF;
            color: #3730A3;
        }

        .status-closed {
            background-color: #F3F4F6;
            color: #374151;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
                /* Hide sidebar on mobile for now, maybe add toggle */
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">HostelConnect</a>
            <div class="flex items-center gap-4">
                <span id="user-greeting" style="font-size: 0.875rem; font-weight: 500;">Welcome, User</span>
                <button id="logout-btn" class="btn btn-sm btn-outline">Logout</button>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
                <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open Menu">☰</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-menu">
                <div class="menu-item active" data-section="submit-complaint">
                    📷 Submit Complaint
                </div>
                <div class="menu-item" data-section="my-complaints">
                    📋 My Complaints
                </div>
                <div class="menu-item" data-section="profile">
                    👤 Profile
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Submit Complaint Section -->
            <section id="submit-complaint" class="section active">
                <h2 style="margin-bottom: 1.5rem;">New Complaint</h2>
                <div class="feature-card" style="max-width: 800px;">
                    <form id="complaint-form">
                        <div class="grid gap-4" style="grid-template-columns: 1fr 1fr; margin-bottom: 1rem;">
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Category</label>
                                <select id="category" required
                                    style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                                    <option value="Electrical">Electrical</option>
                                    <option value="Plumbing">Plumbing</option>
                                    <option value="Furniture">Furniture</option>
                                    <option value="Cleaning">Cleaning</option>
                                    <option value="Internet">Internet/Wi-Fi</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Detected
                                    Priority <span
                                        style="font-size: 0.75rem; color: var(--text-muted); font-weight: 400;">(Auto-assigned)</span></label>
                                <div id="priority-display"
                                    style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-muted); font-weight: 500;">
                                    Type to detect...
                                </div>
                                <input type="hidden" id="urgency" value="Low">
                            </div>
                        </div>

                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Title</label>
                            <input type="text" id="title" required placeholder="e.g. Fan not working in Room 101"
                                style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                        </div>

                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Description</label>
                            <textarea id="description" rows="4" required placeholder="Describe the issue in detail..."
                                style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main); font-family: inherit;"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Submit Complaint</button>
                    </form>
                </div>
            </section>

            <!-- My Complaints Section -->
            <section id="my-complaints" class="section">
                <h2 style="margin-bottom: 1.5rem;">My Complaints</h2>
                <div class="feature-card">
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; text-align: left;">
                            <thead>
                                <tr style="border-bottom: 2px solid var(--border-color);">
                                    <th style="padding: 1rem;">ID</th>
                                    <th style="padding: 1rem;">Title</th>
                                    <th style="padding: 1rem;">Category</th>
                                    <th style="padding: 1rem;">Date</th>
                                    <th style="padding: 1rem;">Status</th>
                                </tr>
                            </thead>
                            <tbody id="complaints-table-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Profile Section -->
            <section id="profile" class="section">
                <h2 style="margin-bottom: 1.5rem;">My Profile</h2>
                <div class="feature-card" style="max-width: 600px;">
                    <form id="profile-form">
                        <div class="flex items-center gap-4" style="margin-bottom: 2rem;">
                            <div style="position: relative;">
                                <img id="profile-img-display" src="" alt="Profile"
                                    style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background-color: var(--primary-color); display: none;">
                                <div id="profile-icon-display"
                                    style="width: 80px; height: 80px; background-color: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">
                                    👤</div>
                                <label for="profile-pic-input"
                                    style="position: absolute; bottom: 0; right: 0; background: var(--text-main); color: var(--bg-body); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem;">✏️</label>
                                <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
                            </div>
                            <div>
                                <h3 id="profile-name-display">John Doe</h3>
                                <p class="text-muted" id="profile-role-display">Student</p>
                            </div>
                        </div>

                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Full Name</label>
                            <input type="text" id="profile-name" value="John Doe"
                                style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                        </div>

                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Phone Number</label>
                            <input type="tel" id="profile-phone" value="123-456-7890"
                                style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                        </div>

                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Hostel Block /
                                Room</label>
                            <input type="text" id="profile-hostel" value="Block A - 101"
                                style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-body); color: var(--text-main);">
                        </div>

                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/user_dashboard.js"></script>
</body>

</html>
